<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff8c42">
<title>濟州行程 2026 · 6/20–6/27</title>
<style>
  :root{
    --bg:#fff7f0; --card:#ffffff; --ink:#2b2b2b; --muted:#777;
    --accent:#ff8c42; --accent2:#2a9d8f; --line:#f0e3d6;
    --shadow:0 2px 10px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang HK","Segoe UI",Roboto,sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.6;padding-bottom:40px}
  header{background:linear-gradient(135deg,#ff8c42,#ff6b6b);color:#fff;padding:22px 18px 18px;
         border-radius:0 0 22px 22px;box-shadow:var(--shadow)}
  header h1{margin:0 0 4px;font-size:1.45rem}
  header .sub{font-size:.85rem;opacity:.92}
  .meta{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .pill{background:rgba(255,255,255,.22);border-radius:12px;padding:8px 11px;font-size:.78rem;flex:1;min-width:130px}
  .pill b{display:block;font-size:.72rem;opacity:.8;font-weight:500;margin-bottom:2px}
  nav{position:sticky;top:0;z-index:10;background:var(--bg);padding:10px 0;overflow-x:auto;white-space:nowrap;
      border-bottom:1px solid var(--line)}
  nav::-webkit-scrollbar{display:none}
  .tab{display:inline-block;padding:8px 14px;margin:0 4px;border-radius:20px;background:#fff;border:1px solid var(--line);
       font-size:.85rem;color:var(--muted);cursor:pointer;user-select:none}
  .tab:first-child{margin-left:14px}.tab:last-child{margin-right:14px}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  main{padding:16px 14px}
  .panel{display:none;animation:fade .25s ease}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .dayhead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .daynum{background:var(--accent);color:#fff;border-radius:12px;padding:6px 10px;font-weight:700;font-size:.85rem;white-space:nowrap}
  .daytitle{font-size:1.1rem;font-weight:700}
  .daydate{font-size:.8rem;color:var(--muted)}
  .badge{display:inline-block;font-size:.72rem;padding:3px 9px;border-radius:10px;margin:0 6px 10px 0;font-weight:600}
  .b-transport{background:#e7f5f3;color:var(--accent2)}
  .b-tag{background:#fdeee2;color:#d9772e}
  .card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:6px 4px;margin-bottom:14px}
  .item{display:flex;gap:12px;padding:11px 12px;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .time{font-size:.78rem;color:var(--accent);font-weight:700;min-width:54px;padding-top:2px}
  .body .t{font-weight:600;font-size:.95rem}
  .body .d{font-size:.82rem;color:var(--muted);margin-top:2px}
  .body .kr{font-size:.8rem;color:#b06a2c}
  .maplink{display:inline-block;margin-top:5px;font-size:.74rem;color:var(--accent2);text-decoration:none;
           border:1px solid #cdeae5;border-radius:8px;padding:2px 8px}
  .note{background:#fff4e6;border-left:4px solid var(--accent);border-radius:8px;padding:10px 12px;
        font-size:.82rem;margin:10px 0}
  .note.warn{background:#ffe9e9;border-left-color:#ff6b6b}
  .note.spa{background:#eef6ff;border-left-color:#4a90d9}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:var(--shadow);font-size:.82rem}
  th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:#fdeee2;font-size:.78rem}
  tr:last-child td{border-bottom:none}
  h3.sec{font-size:1rem;margin:18px 0 8px}
  ul.tips{padding-left:18px;font-size:.85rem}
  ul.tips li{margin-bottom:7px}
  footer{text-align:center;font-size:.72rem;color:var(--muted);margin-top:24px;padding:0 16px}
</style>
</head>
<body>
<header>
  <h1>🍊 濟州 8日7夜</h1>
  <div class="sub">2026/6/20（六）– 6/27（六）· 一人・無自駕（Kakao T + 巴士）· base：西歸浦 KAL</div>
  <div class="meta">
    <div class="pill"><b>✈️ 去程</b>UO698 · 6/20 02:30 HKG → 06:30 CJU</div>
    <div class="pill"><b>✈️ 回程</b>UO699 · 6/27 07:30 CJU → 09:40 HKG</div>
    <div class="pill"><b>🏨 住宿</b>西歸浦 KAL ×6晚 + 機場汗蒸幕 ×1</div>
  </div>
</header>

<nav id="nav"></nav>
<main id="main"></main>

<footer>韓文名可㩒「Naver」掣直接搜尋導航 · 行程可改，話我知就微調</footer>

<script>
const NAVER = q => "https://map.naver.com/v5/search/" + encodeURIComponent(q);

const panels = [
  { id:"transport", tab:"🚗 交通", custom:"transport" },
  { id:"d1", tab:"Day 1", date:"6/20（六）", title:"抵達 → 機場汗蒸幕 → 西歸浦", tags:["輕鬆","汗蒸幕"], transport:"巴士600 → KAL",
    note:{cls:"spa",text:"🛁 通宵機攰 + 15:00 先 check-in，中間去機場汗蒸幕沖涼/浸浴/瞓覺充電，最爽。"},
    items:[
      {time:"06:30",t:"落機 CJU，攞行李"},
      {time:"上午",t:"용두암해수랜드 Yongduam Haesu Spa Land",d:"近機場~10分 · 海水浴+汗蒸幕+休息室。想高級啲：Jeju Dream Tower 찜질 Spa（06:00開）",kr:"용두암해수랜드"},
      {time:"中午後",t:"搭巴士600 → Seogwipo KAL Hotel",d:"機場5號閘口 · ₩5,000 · ~80分 · 終點站就係酒店"},
      {time:"15:00",t:"Check-in，寄行李"},
      {time:"黃昏",t:"天地淵瀑布（夜間點燈）/ 正房瀑布",d:"近酒店",kr:"천지연폭포"},
      {time:"晚餐",t:"每日偶來市場 + 帶魚 네거리식당",kr:"네거리식당"}
    ]},
  { id:"d2", tab:"Day 2", date:"6/21（日）", title:"西歸浦南岸 + 中文觀光區", tags:["步行/短程Kakao T"], transport:"短程Kakao T",
    items:[
      {time:"上午",t:"柱狀節理帶 → 中文海水浴場",kr:"주상절리"},
      {time:"午餐",t:"색달식당 帶魚 / 刀魚湯",d:"中文區",kr:"색달식당"},
      {time:"下午",t:"山茶花之丘 Camellia Hill",d:"或 泰迪熊博物館 / 小人國（任揀）· ~20分車",kr:"카멜리아힐"},
      {time:"黃昏",t:"獨立岩睇日落",kr:"외돌개"},
      {time:"晚餐",t:"호정이네 帶魚 / 국수바다 麵",kr:"호정이네"}
    ]},
  { id:"d3", tab:"Day 3", date:"6/22（一）", title:"東部", tags:["巴士201/101 + Kakao T"], transport:"巴士201/101 + Kakao T",
    note:{cls:"",text:"最遠（離西歸浦50–70分）。落車即同司機攞電話，走時 call 返佢嚟接。想去牛島就用足一日，跳過萬丈窟。"},
    items:[
      {time:"早上",t:"城山日出峰",d:"早去人少",kr:"성산일출봉"},
      {time:"",t:"涉地可支 Seopjikoji",kr:"섭지코지"},
      {time:"午餐",t:"명진전복 鮑魚砂鍋飯",kr:"명진전복"},
      {time:"",t:"萬丈窟 Manjanggul",d:"UNESCO熔岩洞，入面涼",kr:"만장굴"},
      {time:"黃昏前",t:"月汀里海邊 cafe",kr:"월정리"}
    ]},
  { id:"d4", tab:"Day 4", date:"6/23（二）", title:"中部 — 漢拿山 或 茶+火山口", tags:["二選一"], transport:"巴士281/240 + Kakao T",
    note:{cls:"",text:"週二好多市場/食肆休（東門市場週二休）。中部班次疏，預早 Naver 查巴士。"},
    items:[
      {time:"方案A",t:"漢拿山行山",d:"城板岳線巴士281 / 觀音寺線 · 需網上預約、極早出發、時間管制嚴",kr:"한라산"},
      {time:"方案B",t:"O'Sulloc 茶博物館",d:"抹茶",kr:"오설록"},
      {time:"",t:"山君不離 火山口",kr:"산굼부리"},
      {time:"",t:"Eco Land 森林小火車",kr:"에코랜드"}
    ]},
  { id:"d5", tab:"Day 5", date:"6/24（三）", title:"西部", tags:["沿岸巴士202 + Kakao T"], transport:"沿岸巴士202 + Kakao T",
    note:{cls:"",text:"西岸沿岸巴士202班次密，做骨幹好可靠，Kakao T 補最後一程。"},
    items:[
      {time:"上午",t:"涯月咖啡一條街 + 涯月海岸",d:"海景cafe密度最高",kr:"애월 카페거리"},
      {time:"",t:"挾才海水浴場 + 翰林公園",kr:"협재해변"},
      {time:"",t:"오드랑 베이커리",d:"蒜蓉爆漿法包，早去賣完即止",kr:"오드랑베이커리"},
      {time:"午餐",t:"涯月鮭魚本店",d:"三文魚刺身 · 11:00–21:00 · 週日休",kr:"애월 연어"},
      {time:"黃昏",t:"挾才 / 涯月睇日落"}
    ]},
  { id:"d6", tab:"Day 6", date:"6/25（四）", title:"西歸浦 機動 / 手信 / 休息", tags:["彈性"], transport:"步行",
    note:{cls:"",text:"今晚瞓 KAL，準備聽日 check-out 帶住行李上濟州市。"},
    items:[
      {time:"上午",t:"每日偶來市場 補手信",d:"柑橘朱古力/果醬/果凍/馬格利（買加工品，鮮果帶唔到）",kr:"서귀포매일올레시장"},
      {time:"後備",t:"Zarolo Museum 光影展",d:"落雨後備，或重遊最鍾意景點 / 酒店泳池+spa",kr:"자롤로뮤지엄"},
      {time:"晚上",t:"瞓 KAL，執行李"}
    ]},
  { id:"d7", tab:"Day 7", date:"6/26（五）", title:"濟州市購物 → 機場汗蒸幕過夜", tags:["購物","汗蒸幕"], transport:"巴士600 / Kakao T",
    note:{cls:"spa",text:"🛁 朝早 check-out KAL 帶行李上濟州市；行李擺汗蒸幕/巴士總站儲物櫃，玩完返汗蒸幕瞓，朝早短程入機場——免凌晨由西歸浦搏命截長途車。"},
    items:[
      {time:"朝早",t:"KAL check-out → 巴士600/Kakao T 上濟州市"},
      {time:"",t:"London Bagel Museum",d:"要排隊，一開門就去",kr:"런던베이글뮤지엄"},
      {time:"",t:"東門市場",d:"街頭小食 + 手信 · 07:00–21:00",kr:"동문재래시장"},
      {time:"下午",t:"新羅/樂天免稅店 + 步行街 + 龍頭岩",kr:"용두암"},
      {time:"晚餐",t:"만복흑돼지 黑豬肉",d:"#1 · 或 칠돈가",kr:"만복흑돼지"},
      {time:"晚上",t:"용두암해수랜드（24小時）嘆汗蒸幕 + 過夜",d:"近機場~10分",kr:"용두암해수랜드"}
    ]},
  { id:"d8", tab:"Day 8", date:"6/27（六）", title:"回程", tags:["回港"], transport:"短程Kakao T",
    items:[
      {time:"~05:30",t:"汗蒸幕醒 → 短程入機場",d:"Kakao T/的士 ~10–15分"},
      {time:"",t:"國際線 check-in",d:"HK Express 建議起飛前90分到"},
      {time:"07:30",t:"UO699 → 香港",d:"09:40 抵港"}
    ]}
];

const TRANSPORT = `
<h3 class="sec">🚗 一人・唔包車・Kakao T + 巴士 → 得！</h3>
<p style="font-size:.85rem;color:#555;margin:0 0 10px">重點：<b>巴士做骨幹，Kakao T 補最後一程</b>。</p>
<table>
<tr><th>場景</th><th>方法</th></tr>
<tr><td>機場 ⇄ 西歸浦</td><td><b>巴士600號</b>：終點站＝KAL！₩5,000·~80分·機場5號閘口</td></tr>
<tr><td>西歸浦市區 / 中文區</td><td><b>Kakao T</b> 短程，平又快</td></tr>
<tr><td>西部（涯月/挾才/翰林）</td><td>沿岸 <b>巴士202</b>（密）+ Kakao T 補尾程</td></tr>
<tr><td>東部（城山/萬丈窟/月汀里）</td><td><b>巴士201/101</b> 沿線 + Kakao T</td></tr>
<tr><td>中部（Osulloc/山君不離/漢拿山）</td><td>最荒：漢拿山登山口 <b>281/240</b>；其餘班次疏，Naver 查</td></tr>
<tr><td>Uber</td><td>❌ 濟州市以外幾乎冇車，唔好靠</td></tr>
</table>
<h3 class="sec">令一人純 Kakao T 行得通嘅 5 招</h3>
<ul class="tips">
<li><b>巴士做骨幹</b>（西岸202、東岸201/101），Kakao T 只補最後一公里。</li>
<li>落車即<b>同司機攞 KakaoTalk/電話</b>，走時 call 返佢嚟接。</li>
<li>叫車揀 <b>「대기（等候）」</b>，請司機喺荒點等你＝臨時迷你包車。</li>
<li>每個遠程日<b>最多2–3個荒點</b>，等車都唔會亂。</li>
<li><b>唔好喺荒點留到黃昏/收場</b>先走，嗰陣最易冇車。</li>
</ul>
<div class="note spa">🛁 <b>頭尾汗蒸幕</b>：Day1落機去機場汗蒸幕充電；最後一晚瞓機場24h汗蒸幕（용두암해수랜드），朝早短程入機場，免凌晨長途截車。</div>
<div class="note">App：Kakao T、Naver Map、Papago、CatchTable。濟州市⇄西歸浦的士~₩40,000–50,000；巴士600只要₩5,000。</div>
<h3 class="sec">📝 實用提醒</h3>
<ul class="tips">
<li>熱門餐廳（夢炭等）用 CatchTable 早訂。</li>
<li>退稅：單張滿₩15,000可退；WOWPASS方便。</li>
<li>好多市場/食肆 週二或週三休，去前 Naver 查。</li>
<li>6月：鮮柑橘季已過（買加工品）；繡球花盛開（終達里 종달리）。</li>
<li>瞓汗蒸幕嗰晚帶細袋裝隨身/翌日衫，行李擺儲物櫃。</li>
</ul>`;

const nav = document.getElementById("nav");
const main = document.getElementById("main");

panels.forEach((p,i)=>{
  const tab = document.createElement("span");
  tab.className = "tab" + (i===0?" active":"");
  tab.textContent = p.tab;
  tab.onclick = ()=>select(i);
  nav.appendChild(tab);

  const panel = document.createElement("section");
  panel.className = "panel" + (i===0?" active":"");
  if(p.custom==="transport"){ panel.innerHTML = TRANSPORT; }
  else {
    let h = `<div class="dayhead"><span class="daynum">${p.tab}</span>
      <div><div class="daytitle">${p.title}</div><div class="daydate">${p.date}</div></div></div>`;
    h += `<span class="badge b-transport">🚗 ${p.transport}</span>`;
    (p.tags||[]).forEach(t=>h+=`<span class="badge b-tag">${t}</span>`);
    if(p.note) h+=`<div class="note ${p.note.cls||""}">${p.note.text}</div>`;
    h += `<div class="card">`;
    p.items.forEach(it=>{
      h+=`<div class="item"><div class="time">${it.time||""}</div><div class="body">
        <div class="t">${it.t}</div>
        ${it.d?`<div class="d">${it.d}</div>`:""}
        ${it.kr?`<div class="kr">${it.kr}</div><a class="maplink" target="_blank" href="${NAVER(it.kr)}">📍 Naver導航</a>`:""}
      </div></div>`;
    });
    h += `</div>`;
    panel.innerHTML = h;
  }
  main.appendChild(panel);
});

function select(i){
  document.querySelectorAll(".tab").forEach((t,j)=>t.classList.toggle("active",i===j));
  document.querySelectorAll(".panel").forEach((p,j)=>p.classList.toggle("active",i===j));
  document.querySelectorAll(".tab")[i].scrollIntoView({inline:"center",block:"nearest",behavior:"smooth"});
  window.scrollTo({top:0,behavior:"smooth"});
}
</script>
</body>
</html>
