<style>
  :root{

  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang HK","Segoe UI",Roboto,sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.6;padding-bottom:40px}
  header{background:linear-gradient(135deg,#ff8c42,#ff6b6b);color:#fff;padding:22px 18px 18px;
         border-radius:0 0 22px 22px;box-shadow:var(--shadow)}

  header .sub{font-size:.85rem;opacity:.92}
  .meta{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

  nav{position:sticky;top:0;z-index:10;background:var(--bg);padding:10px 0;overflow-x:auto;white-space:nowrap;
      border-bottom:1px solid var(--line)}

  .tab{display:inline-block;padding:8px 14px;margin:0 4px;border-radius:20px;background:#fff;border:1px solid var(--line);
       font-size:.85rem;color:var(--muted);cursor:pointer;user-select:none}
  .tab:first-child{margin-left:14px}.tab:last-child{margin-right:14px}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  main{padding:16px 14px}

  .dayhead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .daynum{background:var(--accent);color:#fff;border-radius:12px;padding:6px 10px;font-weight:700;font-size:.85rem;white-space:nowrap}

  .time{font-size:.78rem;color:var(--accent);font-weight:700;min-width:54px;padding-top:2px}
  .body .t{font-weight:600;font-size:.95rem}
  .body .d{font-size:.82rem;color:var(--muted);margin-top:2px}
  .body .kr{font-size:.8rem;color:#b06a2c}

  .note.warn{background:#ffe9e9;border-left-color:#ff6b6b}
  .note.spa{background:#eef6ff;border-left-color:#4a90d9}

  th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:#fdeee2;font-size:.78rem}
  tr:last-child td{border-bottom:none}
  h3.sec{font-size:1rem;margin:18px 0 8px}
  ul.tips{padding-left:18px;font-size:.85rem}
  ul.tips li{margin-bottom:7px}
  footer{text-align:center;font-size:.72rem;color:var(--muted);margin-top:24px;padding:0 16px}
  .ckgrp{background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:4px 4px;margin-bottom:14px}
  .ckhead{font-weight:700;font-size:.92rem;padding:10px 12px 4px;color:var(--accent)}
  .cksub{font-size:.76rem;color:var(--muted);padding:0 12px 6px}
  .ck{display:flex;gap:11px;align-items:flex-start;padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none}
  .ck:last-child{border-bottom:none}
  .ck .box{width:20px;height:20px;border:2px solid var(--accent);border-radius:6px;flex:none;margin-top:1px;

  .ck.done .box{background:var(--accent)}
  .ck.done .box::after{content:"✓"}
  .ck .lbl{font-size:.88rem}
  .ck.done .lbl{color:var(--muted);text-decoration:line-through}
  .ck .lbl b{color:var(--accent2)}

  .ckbar .prog>i{display:block;height:100%;background:var(--accent);width:0;transition:width .2s}
  .ckbar .pct{font-size:.78rem;color:var(--muted);font-weight:600;min-width:74px;text-align:right}
  .ckreset{display:inline-block;font-size:.74rem;color:var(--muted);border:1px solid var(--line);

</style>

    const bg = use ? ` style="background:#fff9f3"` : "";
    const search = (name+" "+perk+" "+(use||"")).toLowerCase();

  });

  return h;
}
function apFilter(v){
  if(v!==undefined){ const q=document.getElementById("apq"); if(q&&q.value!==v) q.value=v; }
  const txt=((document.getElementById("apq")||{}).value||"").trim().toLowerCase();
  let shown=0;
  document.querySelectorAll("#aptbl tr[data-s]").forEach(tr=>{
    const hitTxt = !txt || tr.dataset.s.indexOf(txt)>=0;
    const hitReg = !apActiveRegion || tr.dataset.r===apActiveRegion;
    const hit = hitTxt && hitReg;
    tr.style.display = hit ? "" : "none";
    if(hit) shown++;
  });
  const none=document.getElementById("apnone");
  if(none) none.style.display = shown ? "none" : "block";
}
function apRegion(r){
  apActiveRegion = r;
  document.querySelectorAll("#aprchips .apchip").forEach(b=>{
    const on = b.dataset.r===r;
    b.style.background = on ? "var(--accent)" : "#fff";
    b.style.color = on ? "#fff" : "var(--ink)";
    b.style.borderColor = on ? "var(--accent)" : "var(--line)";
  });
  apFilter();
}

  const state = ckLoad();
  let h = `<div class="ckbar"><div class="prog"><i id="ckfill"></i></div><span class="pct" id="ckpct">0%</span></div>`;
  h += `<span class="ckreset" id="ckreset">↺ 全部重設</span>`;
  let idx=0;
  CK_DATA.forEach(g=>{
    h += `<div class="ckgrp"><div class="ckhead">${g.head}</div>`;
    if(g.sub) h += `<div class="cksub">${g.sub}</div>`;
    g.items.forEach(it=>{
      const id="ck"+idx; const done=state[id]?" done":"";
      h += `<div class="ck${done}" data-id="${id}"><span class="box"></span><span class="lbl">${it}</span></div>`;
      idx++;
    });
    h += `</div>`;
  });
  return h;
}
function ckUpdateProgress(){
  const all=document.querySelectorAll(".ck");
  const done=document.querySelectorAll(".ck.done").length;
  const pct=all.length?Math.round(done/all.length*100):0;
  const fill=document.getElementById("ckfill"), pc=document.getElementById("ckpct");
  if(fill) fill.style.width=pct+"%";
  if(pc) pc.textContent=done+"/"+all.length+" · "+pct+"%";
}

const nav = document.getElementById("nav");
const main = document.getElementById("main");

panels.forEach((p,i)=>{
  const tab = document.createElement("span");
  tab.className = "tab" + (i===0?" active":"");
  tab.textContent = p.tab;
  tab.onclick = ()=>select(i);
  nav.appendChild(tab);

  const panel = document.createElement("section");
  panel.className = "panel" + (i===0?" active":"");
  if(p.custom==="transport"){ panel.innerHTML = TRANSPORT; }
  else if(p.custom==="food"){ panel.innerHTML = FOOD; }
  else if(p.custom==="checklist"){ panel.innerHTML = buildChecklist(); }
  else if(p.custom==="booking"){ panel.innerHTML = BOOKING; }
  else if(p.custom==="allpass"){ panel.innerHTML = buildAllpass(); }
  else {
    let h = `<div class="dayhead"><span class="daynum">${p.tab}</span>
      <div><div class="daytitle">${p.title}</div><div class="daydate">${p.date}</div></div></div>`;
    h += `<span class="badge b-transport">🚗 ${p.transport}</span>`;
    (p.tags||[]).forEach(t=>h+=`<span class="badge b-tag">${t}</span>`);
    if(p.note) h+=`<div class="note ${p.note.cls||""}">${p.note.text}</div>`;
    h += `<div class="card">`;
    p.items.forEach(it=>{
      h+=`<div class="item"><div class="time">${it.time||""}</div><div class="body">
        <div class="t">${it.t}</div>
        ${it.d?`<div class="d">${it.d}</div>`:""}
        ${it.kr?`<div class="kr">${it.kr}</div><a class="maplink" target="_blank" href="${NAVER(it.kr)}">📍 Naver導航</a>`:""}
      </div></div>`;
    });
    h += `</div>`;
    panel.innerHTML = h;
  }
  main.appendChild(panel);
});

function select(i){
  document.querySelectorAll(".tab").forEach((t,j)=>t.classList.toggle("active",i===j));
  document.querySelectorAll(".panel").forEach((p,j)=>p.classList.toggle("active",i===j));
  document.querySelectorAll(".tab")[i].scrollIntoView({inline:"center",block:"nearest",behavior:"smooth"});
  window.scrollTo({top:0,behavior:"smooth"});
}

// 勾選清單：㩒一下 toggle，存喺 localStorage
main.addEventListener("click", e=>{
  const row = e.target.closest(".ck");
  if(row){
    row.classList.toggle("done");
    const s=ckLoad(); const id=row.dataset.id;
    if(row.classList.contains("done")) s[id]=1; else delete s[id];
    ckSave(s); ckUpdateProgress(); return;
  }
  if(e.target.id==="ckreset"){
    ckSave({});
    document.querySelectorAll(".ck.done").forEach(r=>r.classList.remove("done"));
    ckUpdateProgress();
  }
});
ckUpdateProgress();
</script>
</body>
</html>
